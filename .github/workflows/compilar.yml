name: Compilar Aseprite para Windows

on:
  workflow_dispatch: # Esto nos permite activar la compilación manualmente con un botón

jobs:
  build:
    runs-on: windows-2022
    steps:
    - name: Clonar repositorio
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Configurar Developer Command Prompt
      uses: ilammy/msvc-dev-cmd@v1

    - name: Instalar Ninja y CMake
      run: |
        choco install ninja cmake -y

    - name: Descargar Skia precompilado
      run: |
        mkdir C:\deps
        curl -L -o C:\deps\skia.zip https://github.com/aseprite/skia/releases/download/m124-712a472a11/Skia-Windows-Release-x64.zip
        powershell Expand-Archive -Path C:\deps\skia.zip -DestinationPath C:\deps\skia
    - name: Configurar con CMake
      run: |
        mkdir build
        cd build
        cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo -DLAF_BACKEND=skia -DSKIA_DIR=C:\deps\skia -DSKIA_LIBRARY_DIR=C:\deps\skia\out\Release-x64 -DSKIA_LIBRARY=C:\deps\skia\out\Release-x64\skia.lib -DWEBP_LIBRARIES=C:\deps\skia\out\Release-x64\webp.lib -DENABLE_UPDATER=OFF -G Ninja ..
  
    - name: Compilar con Ninja
      run: |
        cd build
        ninja aseprite

    - name: Subir ejecutable compilado como Artefacto
      uses: actions/upload-artifact@v4
      with:
        name: Aseprite-Windows-Gratis
        path: build/bin/
        overwrite: true
